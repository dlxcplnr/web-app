#version: '3.8'

services:
  # 0 - PhpmyAdmin for GUI importing existing DB from MAMP
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: web_pma
    restart: always
    ports:
      - "8089:80"
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1
    depends_on:
      - db

  # 1. Web-server Nginx (listening on 8081)
  web:
    image: nginx:alpine
    container_name: web_nginx
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  # 2. PHP Interpreter
  php:
    image: php:8.2-fpm-alpine
    container_name: web_php
    #for solving "Could not find driver. Php-fpm"
    entrypoint: >
      sh -c "
      curl -sSL https://github.com/mlocati/docker-php-extension-installer/releases/latest/download/install-php-extensions -o /usr/lo>
      chmod +x /usr/local/bin/install-php-extensions &&
      install-php-extensions pdo_mysql &&
      docker-php-entrypoint php-fpm
      "
    volumes:
      - ./:/var/www/html

  # 3. Data Base MySQL
  db:
    image: mysql:8.0
    container_name: web_db
    restart: always
    environment:
      # changed DB name to that shown in ./api/config.php
      MYSQL_DATABASE: coffee_mood
      MYSQL_ROOT_PASSWORD: super_secret_password_123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      
  # Prometheus + Grafana

  # 4. Agent that collect metrics data from gitlab-vm
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    restart: unless-stopped

  # 5. Data Base Prometheus, that gathering metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    restart: unless-stopped

  # 6. Grafana - panel for visualising metrics
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    # volumes - for saving Grafana Settings
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  db_data:
  grafana_data: # for saving Grafana Settings
