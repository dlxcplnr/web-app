version: '3.8'

services:
  # 1. Веб-сервер Nginx (слухає порт 8080 на твоєму ПК)
  web:
    image: nginx:alpine
    container_name: web_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  # 2. Обробник PHP (інтерпретатор)
  php:
    image: php:8.2-fpm-alpine
    container_name: web_php
    volumes:
      - ./src:/var/www/html

  # 3. База даних MySQL
  db:
    image: mysql:8.0
    container_name: web_db
    restart: always
    environment:
      MYSQL_DATABASE: my_database
      MYSQL_ROOT_PASSWORD: super_secret_password_123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: