stages:
  - deploy

deploy_to_server:
  stage: deploy
  script:
    # 1. Allow work with directory
    - git config --global --add safe.directory /home/gitlab-admin/my-web-app
    # 2. Moving to the directory
    - cd /home/gitlab-admin/my-web-app
    # 3. Reloading git path
    - git remote set-url origin http://oauth2:glpat-sDe4uTjFjFtQjaP1jL_fOm86MQp1OjMH.01.0w1o2m5ek@192.168.0.3/devops/my-web-app.git
    # 4. For cancelling conflict files
    - git fetch --all
    - git reset --hard origin/main
    # 5. Download latest files
    - git pull origin main
    # 6. reload Docker-compose
    - sudo docker compose down
    - sudo docker compose up -d --build
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  tags:
    - docker-deploy